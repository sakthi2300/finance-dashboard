<header class="header" id="header" *ngIf="user">
  <div class="header__left">
    <button class="header__menu-btn" (click)="onToggleSidebar()">
      <i class="fa fa-bars"></i>
    </button>
    <div class="header__breadcrumbs">
      <span class="header__breadcrumb-muted">Pages</span>
      <span class="header__breadcrumb-separator">/</span>
      <span class="header__breadcrumb-active">{{ pageTitle || 'Dashboard' }}</span>
    </div>
  </div>

  <div class="header__actions">
    <!-- Theme Toggle -->
    <button class="header__icon-btn" (click)="onToggleTheme()" [title]="theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'" id="btn-theme-toggle">
      <i class="fa" [class.fa-moon]="theme === 'light'" [class.fa-sun]="theme === 'dark'"></i>
    </button>

    <!-- Notification Dropdown -->
    <div class="header__notification-section" (clickOutside)="closeNotifications.emit()">
      <button class="header__icon-btn" id="btn-notifications" (click)="onToggleNotifications()">
        <i class="fa fa-bell"></i>
        <span class="header__badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </button>

      <div class="notification-dropdown" *ngIf="isNotificationsOpen">
        <div class="notification-dropdown__header">
          <h4>Notifications</h4>
          <span class="mark-all-read" *ngIf="unreadCount > 0" (click)="onMarkAllRead()">Mark all as read</span>
        </div>
        <div class="notification-dropdown__body">
          <div class="notification-empty" *ngIf="notifications.length === 0">
            <i class="fa fa-check-circle"></i>
            <p>You're all caught up!</p>
          </div>
          <div class="notification-item" *ngFor="let notif of notifications" [class.unread]="!notif.read" (click)="onMarkAsRead(notif.id)">
            <div class="notif-icon" [ngClass]="'notif-' + notif.type">
              <i class="fa" [ngClass]="getNotifIcon(notif.type)"></i>
            </div>
            <div class="notif-content">
              <p class="notif-text">{{ notif.message }}</p>
              <span class="notif-time">{{ notif.time }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Custom Premium Role Selector -->
    <div class="header__role-section" (click)="isRoleMenuOpen = !isRoleMenuOpen" (clickOutside)="isRoleMenuOpen = false">
      <span class="header__role-label">Role:</span>
      <div class="custom-select-trigger" [class.is-open]="isRoleMenuOpen">
        <span class="role-value">{{ user.role | titlecase }}</span>
        <i class="fa fa-chevron-down"></i>
      </div>

      <div class="custom-dropdown-menu" *ngIf="isRoleMenuOpen">
        <div class="dropdown-item" [class.active]="user.role === 'admin'" (click)="onRoleChange('admin')">
          <i class="fa fa-shield-alt"></i> Admin
        </div>
        <div class="dropdown-item" [class.active]="user.role === 'viewer'" (click)="onRoleChange('viewer')">
          <i class="fa fa-eye"></i> Viewer
        </div>
      </div>
    </div>

    <!-- User Avatar -->
    <div class="header__user" id="header-user">
      <div class="header__avatar">
        {{ user.role === 'admin' ? 'A' : 'V' }}
      </div>
    </div>
  </div>
</header>
