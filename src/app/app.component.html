<div class="app-layout" *ngIf="currentUser$ | async as user">
  <!-- Mobile Overlay -->
  <div class="mobile-overlay" *ngIf="isSidebarOpen" (click)="toggleSidebarMobile()"></div>
  
  <!-- Decoupled Sidebar Component -->
  <app-sidebar 
    [isSidebarOpen]="isSidebarOpen"
    (toggleSidebar)="toggleSidebarMobile()">
  </app-sidebar>

  <!-- Main Content Area -->
  <div class="main-area">
    <!-- Decoupled Header Component -->
    <app-header
      [user]="user"
      [theme]="(theme$ | async)"
      [pageTitle]="(pageTitle$ | async)"
      [unreadCount]="unreadCount"
      [notifications]="notifications"
      [isNotificationsOpen]="isNotificationsOpen"
      [isRoleMenuOpen]="isRoleMenuOpen"
      (toggleSidebar)="toggleSidebarMobile()"
      (toggleTheme)="toggleTheme()"
      (toggleNotifications)="toggleNotifications()"
      (roleChange)="onRoleChange($event)"
      (markAllRead)="markAllRead()"
      (markAsRead)="markAsRead($event)"
      (closeNotifications)="isNotificationsOpen = false">
    </app-header>

    <!-- Page Content Slot -->
    <main class="content" id="main-content">
      <div class="content__inner">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
